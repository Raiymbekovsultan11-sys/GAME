 <!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #0f2027, #203a43, #2c5364);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: monospace;
    color: white;
}

canvas {
    background: #000;
    box-shadow: 0 0 30px #00ff9d;
    border-radius: 10px;
    max-width: 90vw;
    max-height: 60vh;
}

/* UI */
.ui {
    margin-bottom: 10px;
    font-size: 20px;
}

/* кнопки */
.controls {
    margin-top: 15px;
    display: grid;
    grid-template-columns: repeat(3, 70px);
    gap: 10px;
    justify-content: center;
}

.btn {
    background: #111;
    border: 2px solid #00ff9d;
    color: #00ff9d;
    font-size: 20px;
    padding: 15px;
    border-radius: 10px;
    text-align: center;
    user-select: none;
}

.btn:active {
    background: #00ff9d;
    color: black;
}
</style>
</head>
<body>

<div class="ui">Score: <span id="score">0</span></div>

<canvas id="game"></canvas>

<div class="controls">
    <div></div>
    <div class="btn" onclick="setDir('up')">⬆️</div>
    <div></div>

    <div class="btn" onclick="setDir('left')">⬅️</div>
    <div></div>
    <div class="btn" onclick="setDir('right')">➡️</div>

    <div></div>
    <div class="btn" onclick="setDir('down')">⬇️</div>
    <div></div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// адаптивный размер
function resize() {
    let size = Math.min(window.innerWidth * 0.9, window.innerHeight * 0.6);
    canvas.width = size;
    canvas.height = size;
}
resize();
window.addEventListener("resize", resize);

const grid = 20;
let count = 0;

let speed = 6;
let minSpeed = 3;

let snake = {
    x: 160,
    y: 160,
    dx: grid,
    dy: 0,
    cells: [],
    maxCells: 4
};

let apple = { x: 0, y: 0 };
spawnApple();

function spawnApple() {
    apple.x = Math.floor(Math.random() * (canvas.width / grid)) * grid;
    apple.y = Math.floor(Math.random() * (canvas.height / grid)) * grid;
}

function setDir(dir) {
    if (dir === "left" && snake.dx === 0) {
        snake.dx = -grid; snake.dy = 0;
    }
    if (dir === "right" && snake.dx === 0) {
        snake.dx = grid; snake.dy = 0;
    }
    if (dir === "up" && snake.dy === 0) {
        snake.dy = -grid; snake.dx = 0;
    }
    if (dir === "down" && snake.dy === 0) {
        snake.dy = grid; snake.dx = 0;
    }
}

// клавиатура
document.addEventListener("keydown", e => {
    if (e.key === "ArrowLeft") setDir("left");
    if (e.key === "ArrowRight") setDir("right");
    if (e.key === "ArrowUp") setDir("up");
    if (e.key === "ArrowDown") setDir("down");
});

function loop() {
    requestAnimationFrame(loop);

    if (++count < speed) return;
    count = 0;

    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    snake.x += snake.dx;
    snake.y += snake.dy;

    // телепорт
    if (snake.x < 0) snake.x = canvas.width - grid;
    if (snake.x >= canvas.width) snake.x = 0;
    if (snake.y < 0) snake.y = canvas.height - grid;
    if (snake.y >= canvas.height) snake.y = 0;

    snake.cells.unshift({x: snake.x, y: snake.y});
    if (snake.cells.length > snake.maxCells) snake.cells.pop();

    // яблоко (свечение)
    ctx.fillStyle = "#ff3b3b";
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#ff3b3b";
    ctx.fillRect(apple.x, apple.y, grid-2, grid-2);
    ctx.shadowBlur = 0;

    // змейка
    ctx.fillStyle = "#00ff9d";
    snake.cells.forEach((cell, index) => {
        ctx.fillRect(cell.x, cell.y, grid-2, grid-2);

        // съел яблоко
        if (cell.x === apple.x && cell.y === apple.y) {
            snake.maxCells++;
            speed -= 0.5;
            if (speed < minSpeed) speed = minSpeed;

            document.getElementById("score").innerText = snake.maxCells - 4;
            spawnApple();
        }

        // столкновение
        for (let i = index + 1; i < snake.cells.
        length; i++) {
            if (cell.x === snake.cells[i].x && cell.y === snake.cells[i].y) {
                snake.x = 160;
                snake.y = 160;
                snake.cells = [];
                snake.maxCells = 4;
                snake.dx = grid;
                snake.dy = 0;
                speed = 6;
                document.getElementById("score").innerText = 0;
            }
        }
    });
}

requestAnimationFrame(loop);
</script>

</body>
</html>
